name: Check or Create SSH Config

on:
  workflow_dispatch:

jobs:
  ssh-config-check:
    runs-on: ubuntu-latest

    steps:
      - name: Fix HOME to real runner home
        run: |
          echo "Real HOME is: $HOME"
          export HOME="/home/runner"
          echo "Adjusted HOME: $HOME"

      - name: Show HOME and prepare .ssh
        run: |
          echo "HOME is: $HOME"
          mkdir -p "$HOME/.ssh"
          ls -la "$HOME"

      - name: Check or create SSH config
        run: |
          CONFIG="$HOME/.ssh/config"

          if [ -f "$CONFIG" ]; then
            echo "✅ Found existing SSH config"
            echo "---- Existing config ----"
            cat "$CONFIG"
            echo "-------------------------"
          else
            echo "⚠️ No SSH config found. Creating..."
            cat << 'EOF' > "$CONFIG"
Host github-codespace
    HostName YOUR-CODESPACE-ID.github.dev
    User codespace
    IdentityFile ~/.ssh/id_ed25519
    ServerAliveInterval 60
    ServerAliveCountMax 6
    ControlMaster auto
    ControlPath ~/.ssh/cm-%r@%h:%p
    ControlPersist yes
EOF
            chmod 600 "$CONFIG"

            echo "---- New config ----"
            cat "$CONFIG"
            echo "--------------------"
          fi
