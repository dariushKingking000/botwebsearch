name: Local Server
on: [push]

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install serve
      run: npm install -g serve
      
    - name: Run Server
      run: |
        serve -s . -l 3000 &
        PID=$!
        sleep 5
        curl -f http://localhost:3000 || exit 1
        kill $PID
