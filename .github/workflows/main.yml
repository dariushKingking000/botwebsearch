name: 🚀 Codespace Deploy + SSH Setup
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 🔧 Setup SSH + authorized_keys
    - name: 🔑 Setup SSH & Authorized Keys
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: fictional-space-acorn-pj44pjq75j7526jwj-44334.app.github.dev
        username: vscode
        key: ${{ secrets.CODESPACES_SSH_KEY }}
        port: 22
        script: |
          # SSH config (یکبار)
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # GitHub Actions public key
          echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKgj81hDQdb17CcsPTYyRKiShTrzYyAXP98MyKt+IM9/ github-actions" >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          
          sudo service ssh restart || true
          echo "✅ SSH Config Complete!"
    
    # 🚀 Deploy
    - name: 🚀 Deploy App
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: fictional-space-acorn-pj44pjq75j7526jwj-44334.app.github.dev
        username: vscode
        key: ${{ secrets.CODESPACES_SSH_KEY }}
        port: 22
        script: |
          cd /workspaces/botwebsearch
          git pull origin main || true
          
          # پروژه‌ت رو فعال کن:
          npm install
          npm run build
          pkill node || true
          nohup npm start > app.log 2>&1 &
          
          echo "✅ Deployed! Logs:"
          tail -10 app.log
