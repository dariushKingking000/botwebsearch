name: 🎭 Complete Playwright + Selenium
on: [workflow_dispatch]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        node-version: '3.11'
        
    - name: 🎭 Install Playwright
      run: |
        npm init -y
        npm install @playwright/test
        npx playwright install --with-deps chromium
        echo "✅ Playwright version: $(npx playwright --version)"
        
    - name: 🐍 Install Selenium
      run: |
        pip install selenium==4.25.0 webdriver-manager
        python -c "import selenium; print('✅ Selenium:', selenium.__version__)"
        
    - name: 📊 Show Versions
      run: |
        echo "Node: $(node --version)"
        echo "Python: $(python --version)"
        echo "npm: $(npm --version)"
        ls -la node_modules/.bin/ | grep playwright
        npx playwright --version
        python -c "import selenium; print(selenium.__version__)"
        
    - name: 📄 Create Test Files
      run: |
        cat > playwright-test.js << 'EOF'
        const { test, expect } = require('@playwright/test');
        test('GitHub Test', async ({ page }) => {
          await page.goto('https://github.com');
          await expect(page).toHaveTitle(/GitHub/);
          console.log('✅ Playwright OK!');
        });
        EOF
        
        cat > selenium-test.py << 'EOF'
        from selenium import webdriver
        from selenium.webdriver.chrome.service import Service
        from webdriver_manager.chrome import ChromeDriverManager
        
        service = Service(ChromeDriverManager().install())
        driver = webdriver.Chrome(service=service)
        driver.get("https://github.com")
        print(f"✅ Selenium OK! Title: {driver.title}")
        driver.quit()
        EOF
        
    - name: 🚀 Run Tests
      run: |
        echo "🎭 Playwright Test:"
        npx playwright test playwright-test.js
        
        echo "🐍 Selenium Test:"
        python selenium-test.py
        
    - name: 💾 Push Changes
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add .
        git commit -m "Add Playwright + Selenium setup" || echo "No changes"
        git push
