name: Check or Create SSH Config

on:
  workflow_dispatch:  # اجرا به صورت دستی از تب Actions

jobs:
  ssh-config-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check if SSH config exists
        run: |
          echo "🔍 Checking for SSH config at $HOME/.ssh/config ..."

          if [ -f "$HOME/.ssh/config" ]; then
            echo "✅ SSH config already exists!"
            echo "---- Existing config ----"
            cat "$HOME/.ssh/config"
            echo "-------------------------"
          else
            echo "⚠️ No SSH config found. Creating a new one..."
            mkdir -p "$HOME/.ssh"

            cat << 'EOF' > "$HOME/.ssh/config"
Host github-codespace
    HostName YOUR-CODESPACE-ID.github.dev
    User codespace
    IdentityFile ~/.ssh/id_ed25519
    ServerAliveInterval 60
    ServerAliveCountMax 6
    ControlMaster auto
    ControlPath ~/.ssh/cm-%r@%h:%p
    ControlPersist yes
EOF

            chmod 600 "$HOME/.ssh/config"

            echo "✅ Created SSH config successfully."
            echo "---- New config ----"
            cat "$HOME/.ssh/config"
            echo "--------------------"
          fi

      - name: Finish
        run: echo "🎉 SSH config check complete!"
