name: 🚀 Deploy + SSH Setup
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 🔧 SSH Setup
    - name: 🔑 Setup SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: fictional-space-acorn-pj44pjq75j7526jwj.github.dev
        username: vscode
        key: ${{ secrets.CODESPACES_SSH_KEY }}
        port: 22
        script: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKgj81hDQdb17CcsPTYyRKiShTrzYyAXP98MyKt+IM9/ github-actions" >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          sudo service ssh restart || true
          echo "✅ SSH Ready!"
    
    # 🚀 Deploy
    - name: 🚀 Deploy App
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: fictional-space-acorn-pj44pjq75j7526jwj.github.dev
        username: vscode
        key: ${{ secrets.CODESPACES_SSH_KEY }}
        port: 22
        script: |
          cd /workspaces/botwebsearch || echo "❌ No project folder"
          pwd && ls -la
          
          git pull origin main || git clone https://github.com/dariushKingking000/botwebsearch .
          npm install
          pkill node || true
          nohup npm start > app.log 2>&1 &
          sleep 3
          echo "✅ Deployed! Logs:"
          tail -10 app.log
