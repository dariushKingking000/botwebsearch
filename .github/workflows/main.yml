name: Screenshot
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: Screenshot
      run: |
        npm init -y
        npm i puppeteer@latest
        cat > screenshot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        // JSON config
        const config = {
          url: 'https://app.n8n.cloud/register',
          width: 1920,
          height: 1080,
          timestamp: new Date().toISOString()
        };
        
        fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        
        (async () => {
          console.log('🚀 Starting browser...');
          const browser = await puppeteer.launch({
            headless: 'new',
            args: [
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--disable-dev-shm-usage',
              '--disable-accelerated-2d-canvas',
              '--no-first-run',
              '--no-zygote'
            ]
          });
          
          const page = await browser.newPage();
          await page.setViewport({width: config.width, height: config.height});
          
          console.log(`📱 Navigating to ${config.url}...`);
          await page.goto(config.url, { 
            waitUntil: 'networkidle2', 
            timeout: 30000 
          });
          
          console.log('📸 Taking screenshot...');
          await page.screenshot({ 
            path: 'screenshot.png', 
            fullPage: true 
          });
          
          await browser.close();
          console.log('✅ Screenshot & config.json saved!');
        })().catch((error) => {
          console.error('❌ Error:', error);
          process.exit(1);
        });
        EOF
        
        node screenshot.js
    
    - name: Commit & Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add screenshot.png config.json
        git commit -m "📸 Screenshot updated $(date '+%Y-%m-%d %H:%M') [skip ci]" || echo "No changes to commit"
        git push || echo "No changes to push"
