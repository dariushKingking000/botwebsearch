name: 🎭 Playwright + Selenium Setup
on: [workflow_dispatch]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 1. Node.js + Python
    - uses: actions/setup-node@v4
      with: { node-version: '20' }
    - uses: actions/setup-python@v5
      with: { python-version: '3.11' }
    
    # 2. نصب Playwright
    - name: 🎭 Install Playwright
      run: |
        npm init -y
        npm install --save-dev @playwright/test
        npx playwright install --with-deps
        npx playwright --version
        
    # 3. نصب Selenium
    - name: 🐍 Install Selenium
      run: |
        pip install selenium webdriver-manager
        python3 -c "import selenium; print(f'Selenium: {selenium.__version__}')"
        
    # 4. تست سریع
    - name: 🧪 Quick Test
      run: |
        echo "✅ Playwright browsers:"
        npx playwright install chromium
        ls -la node_modules/.bin/
        
        echo "✅ Selenium drivers:"
        python3 -c "
from selenium import webdriver
from selenium.webdriver.chrome.service import Service
from webdriver_manager.chrome import ChromeDriverManager
print('Selenium + ChromeDriver OK!')
"
        
    # 5. نسخه‌ها در Log
    - name: 📋 Show All Versions
      run: |
        echo '## 🚀 نسخه‌ها:'
        echo '| Tool | Version |'
        echo '|------|---------|'
        echo "| Node | $(node --version) |"
        echo "| Python | $(python3 --version) |"
        echo "| Playwright | $(npx playwright --version) |"
        echo "| Selenium | $(python3 -c 'import selenium; print(selenium.__version__)') |"
        
    # 6. نمونه تست
    - name: 🎯 Sample Test File
      run: |
        cat > test-playwright.js << 'EOF'
        const { test, expect } = require('@playwright/test');
        test('GitHub', async ({ page }) => {
          await page.goto('https://github.com');
          expect(await page.title()).toBe('GitHub');
        });
        EOF
        
        cat > test-selenium.py << 'EOF'
        from selenium import webdriver
        from selenium.webdriver.common.by import By
        driver = webdriver.Chrome()
        driver.get("https://github.com")
        print("Title:", driver.title)
        driver.quit()
        EOF
