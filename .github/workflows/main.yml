name: 🚀 Codespace Auto Deploy
on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 🔧 Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.CODESPACES_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ secrets.CODESPACES_HOST }} >> ~/.ssh/known_hosts
    
    - name: 🚀 Deploy to Codespace
      run: |
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 vscode@${{ secrets.CODESPACES_HOST }} "
          cd /workspaces/botwebsearch || git clone https://github.com/dariushKingking000/botwebsearch /workspaces/botwebsearch &&
          cd /workspaces/botwebsearch &&
          git pull origin main &&
          npm ci --production &&
          pkill -f 'npm start' || true &&
          sleep 2 &&
          nohup npm start > app.log 2>&1 & &&
          sleep 5 &&
          echo '✅ Status:' &&
          pgrep -f 'npm start' && tail -15 app.log || echo '❌ Failed'
        "
