name: Interactive Terminal
on: [workflow_dispatch]

jobs:
  terminal:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tmux
      run: |
        sudo apt-get update
        sudo apt-get install -y tmux
    
    - name: Start tmux session
      run: |
        tmux new-session -d -s myterm
        tmux send-keys -t myterm "echo '🖥️  Terminal آماده است! دستورات بزن:'" C-m
        tmux send-keys -t myterm "echo '📁 pwd: $(pwd)'" C-m
        tmux send-keys -t myterm "echo '📦 ls -la'" C-m
        tmux send-keys -t myterm "ls -la" C-m
        
    - name: Show terminal output
      run: |
        echo '### خروجی Terminal:'
        tmux capture-pane -t myterm -p
        
    - name: Interactive shell commands
      run: |
        echo '🔧 اجرای دستورات سفارشی...'
        tmux send-keys -t myterm "npm install" C-m  # مثال
        tmux send-keys -t myterm "npm run build" C-m
        sleep 5
        tmux capture-pane -t myterm -p
