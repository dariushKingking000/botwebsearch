name: Download and Commit GH CLI Installer

on:
  push:
    branches:
      - main # یا شاخه‌ای که می‌خواهید workflow روی آن اجرا شود

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download GH CLI installer
        run: |
          DOWNLOAD_URL="https://github.com/cli/cli/releases/download/v2.91.0/gh_2.91.0_windows_amd64.msi"
          FILE_NAME="gh_2.91.0_windows_amd64.msi" # نام فایل خروجی
          curl -L $DOWNLOAD_URL -o $FILE_NAME
          echo "GH CLI installer downloaded successfully."

      - name: Commit and push installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add gh_2.91.0_windows_amd64.msi
          # بررسی کنید که آیا تغییری برای commit وجود دارد
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GH CLI installer v2.91.0"
            git push
            echo "GH CLI installer committed and pushed successfully."
          fi
