name: Download and Commit OpenSSH Installer

on:
  push:
    branches:
      - main

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download OpenSSH installer
        run: |
          DOWNLOAD_URL="https://github.com/PowerShell/Win32-OpenSSH/releases/download/10.0.0.0p2-Preview/OpenSSH-Win64-v10.0.0.0.msi"
          FILE_NAME="OpenSSH-Win64-v10.0.0.0.msi"
          curl -L $DOWNLOAD_URL -o $FILE_NAME
          echo "OpenSSH installer downloaded successfully."

      - name: Commit and push installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add OpenSSH-Win64-v10.0.0.0.msi
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add OpenSSH Win64 v10.0.0.0 (10.0.0.0p2-Preview)"
            git push
            echo "OpenSSH installer committed and pushed successfully."
          fi
