name: 🎭 Setup Playwright
on:
  workflow_dispatch:
  push:
    paths: ['package.json']

jobs:
  install-playwright:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Playwright config
      run: |
        mkdir -p .github/workflows
        cat > playwright.config.ts << 'EOF'
        import { defineConfig } from '@playwright/test';
        export default defineConfig({
          testDir: './tests',
          fullyParallel: true,
          retries: 1,
          use: { baseURL: 'http://localhost:3000' }
        });
        EOF
        
        cat > package.json << 'EOF'
        {
          "name": "your-repo",
          "scripts": {
            "playwright:install": "playwright install --with-deps",
            "test": "playwright test"
          },
          "devDependencies": {
            "@playwright/test": "^1.47.0"
          }
        }
        EOF
        
        mkdir -p tests
        echo 'import { test } from "@playwright/test"; test("basic", async ({ page }) => { await page.goto("https://example.com"); });' > tests/example.spec.ts
    
    - name: Commit changes
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add .
        git diff --staged --quiet || git commit -am "🎭 Add Playwright setup"
        git push
