name: Preview Server
on: [push, pull_request]

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with: 
        node-version: 20
        cache: 'npm'
    
    - name: Install
      run: npm install
      
    - name: Start & Test Server
      run: |
        npx serve -s . -l 3000 &
        PID=$!
        sleep 10
        curl -f http://localhost:3000 || (kill $PID && exit 1)
        kill $PID
