name: Screenshot Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Chrome + FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg xvfb x11-xkb-utils ffmpeg bc
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Install Node deps
      run: npm init -y && npm i puppeteer@latest
    
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        command.txt
        last_command.txt
        command_pipe.txt
        response.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const { execSync } = require("child_process");
        
        let browser = null;
        let page = null;
        
        function wait(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        async function initBrowser() {
          console.log("🚀 راه‌اندازی...");
          browser = await puppeteer.launch({
            headless: false,
            executablePath: '/usr/bin/google-chrome-stable',
            args: [
              '--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage',
              '--no-first-run','--no-service-autorun',
              '--password-store=basic','--window-size=1920,1080'
            ]
          });
          
          page = await browser.newPage();
          await page.setViewport({ width: 1920, height: 1080 });
          
          await page.evaluateOnNewDocument(() => {
            Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
            Object.defineProperty(navigator, 'plugins', { get: () => [1, 2, 3, 4, 5] });
            window.chrome = { runtime: {} };
          });
          
          await page.goto("https://pipedream.com/auth/signup", { waitUntil: 'networkidle0', timeout: 60000 });
          await wait(10000);
          await page.mouse.move(100, 100);
          console.log("✅ آماده!");
        }
        
        async function takeScreenshot() {
          console.log("📸 Screenshot...");
          await page.screenshot({ path: 'screenshot.png', fullPage: false, type: 'png' });
          await page.screenshot({ path: 'screenshot-full.png', fullPage: true, type: 'png' });
          const buffer = await page.screenshot({ type: 'png', fullPage: true });
          fs.writeFileSync("screenshot-base64.txt", buffer.toString('base64'));
          console.log("✅ Screenshot OK!");
        }
        
        async function copyPageText() {
          console.log("📋 Copy متن...");
          const textContent = await page.evaluate(() => {
            return document.body.innerText;
          });
          fs.writeFileSync('page-text.txt', textContent);
          console.log(`✅ متن: ${textContent.length} char`);
        }
        
        async function executeCommand(cmd) {
          console.log(`🔧 ${cmd}`);
          if (cmd.startsWith("click ")) {
            const [x, y] = cmd.slice(6).trim().split(",").map(Number);
            await page.mouse.move(x + Math.random()*10-5, y + Math.random()*10-5);
            await wait(100);
            await page.mouse.click(x, y, { delay: 50 });
          } else if (cmd.startsWith("type ")) {
            const text = cmd.slice(5).trim();
            await page.keyboard.type(text, { delay: 80 });
          } else if (cmd === "enter") {
            await page.keyboard.press('Enter', { delay: 50 });
          } else if (cmd === "copy") {
            await copyPageText();
          }
        }
        
        async function recordVideoWithActions(commands) {
          console.log("🎥 Video...");
          
          if (fs.existsSync('frames')) {
            fs.rmSync('frames', { recursive: true, force: true });
          }
          fs.mkdirSync('frames', { recursive: true });
          
          const fps = 12;
          const cmdCount = commands.length;
          const delayPerCmd = cmdCount >= 7 ? 15000 : cmdCount >= 4 ? 12000 : 20000;
          const uniqueId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          
          console.log(`📊 ${cmdCount} cmd - ${delayPerCmd/1000}s - ID: ${uniqueId}`);
          
          let frameIndex = 0;
          
          for(let cmdIndex = 0; cmdIndex < cmdCount; cmdIndex++) {
            const cmd = commands[cmdIndex];
            
            // Pre frames
            for(let i = 0; i < 3; i++) {
              await page.screenshot({ path: `frames/frame_${uniqueId}_${frameIndex.toString().padStart(6,'0')}.png` });
              frameIndex++;
              await wait(800);
            }
            
            await executeCommand(cmd);
            
            // Post frames
            for(let i = 0; i < 8; i++) {
              await page.screenshot({ path: `frames/frame_${uniqueId}_${frameIndex.toString().padStart(6,'0')}.png` });
              frameIndex++;
              await wait(800);
            }
          }
          
          // Screenshot FINAL
          await takeScreenshot();
          
          const output = `video_${uniqueId}.mp4`;
          try {
            execSync(`ffmpeg -y -r ${fps} -i frames/frame_${uniqueId}_%06d.png -c:v libx264 -pix_fmt yuv420p -crf 20 -preset fast -t 30 ${output}`, { timeout: 60000 });
            const stats = fs.statSync(output);
            console.log(`✅ Video ${frameIndex} frames: ${Math.round(stats.size/1024/1024*100)/100}MB`);
          } catch(e) {
            console.error("❌ FFmpeg:", e.message);
          }
          
          fs.rmSync('frames', { recursive: true, force: true });
        }
        
        (async () => {
          await initBrowser();
          
          while (true) {
            try {
              if (fs.existsSync('command_pipe.txt')) {
                let content = fs.readFileSync('command_pipe.txt', 'utf8').trim();
                console.log(`🆕 ${content}`);
                
                if (content === "exit") {
                  if (browser) await browser.close();
                  process.exit(0);
                }
                
                const commands = content.split('\n')
                  .map(line => line.trim())
                  .filter(line => line && (line.startsWith('click ') || line.startsWith('type ') || line === 'enter' || line === 'copy'));
                
                console.log(`📝 ${commands.length} دستور`);
                
                await recordVideoWithActions(commands);
                
                fs.writeFileSync('response.txt', `✅ ${commands.length} OK!`);
                fs.unlinkSync('command_pipe.txt');
              }
            } catch(e) {
              console.error("❌", e.message);
              await wait(1000);
            }
            
            await wait(500);
          }
        })();
        EOF
    
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        sleep 2
        
        git config --global user.name "Screenshot Bot"
        git config --global user.email "bot@github.com"
        git config core.fileMode false
        
        rm -rf last_command.txt command_pipe.txt response.txt screenshot* video* page-text.txt frames/
        
        timeout 7200 node bot.js &
        BOT_PID=$!
        echo "🤖 PID: $BOT_PID"
        sleep 45
        
        while true; do
          git fetch origin
          git reset --hard origin/main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            LAST_CMD=$(cat last_command.txt 2>/dev/null || echo "")
            
            if [ "$CONTENT" != "exit" ] && [ "$CONTENT" != "$LAST_CMD" ]; then
              echo "🆕 COMMAND: $CONTENT"
              rm -f command_pipe.txt response.txt screenshot* video* page-text.txt
              echo "$CONTENT" > command_pipe.txt
              
              for i in {1..400}; do
                if [ -f response.txt ]; then
                  echo "$(cat response.txt)"
                  rm -f response.txt command_pipe.txt
                  break
                fi
                sleep 1
              done
              
              # لیست فایل‌ها
              echo "=== FILES ==="
              find . -maxdepth 1 -name "screenshot*" -o -name "video*" -o -name "page-text.txt" | while read f; do
                if [ -f "$f" ]; then
                  SIZE=$(stat -c %s "$f")
                  MB=$(echo "scale=2; $SIZE/1024/1024" | bc)
                  echo "📁 $f: ${MB}MB ($(ls -lh "$f" | awk '{print $5}'))"
                fi
              done
              
              # Force add همه فایل‌ها
              echo "📤 GIT ADD..."
              git add -f screenshot*.png screenshot-base64.txt video*.mp4 page-text.txt || true
              git add -f . || true
              
              # چک تغییرات
              if ! git diff --staged --quiet; then
                git diff --staged --name-only | head -5
                git commit -m "🎥 Video + Screenshot | $(date '+%Y-%m-%d %H:%M') | $(ls video_*.mp4 2>/dev/null | tail -1 | xargs basename 2>/dev/null || echo 'NO_VIDEO')" || true
                
                echo "🚀 GIT PUSH..."
                git push origin main -f || git push origin HEAD:main -f
                if [ $? -eq 0 ]; then
                  echo "✅ PUSH موفق!"
                else
                  echo "❌ Push fail!"
                fi
              else
                echo "ℹ️ No changes to commit"
              fi
              
              echo "$CONTENT" > last_command.txt
            fi
            rm -f command.txt
          fi
          
          sleep 8
        done
