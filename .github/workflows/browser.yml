name: 🎮 Interactive Browser
on:
  workflow_dispatch: {}  # دستی
  repository_dispatch:   # از Node-RED
    types: [browser-action]

permissions:
  contents: write

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm i playwright
    
    - name: npx playwright install
      run: npx playwright install chromium
    
    - name: 🎯 Browser Action
      env:
        ACTION: ${{ github.event.client_payload.action || 'click' }}
        X: ${{ github.event.client_payload.x || 300 }}
        Y: ${{ github.event.client_payload.y || 400 }}
        TEXT: ${{ github.event.client_payload.text || 'test' }}
      run: |
        cat > action.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch({headless: false});
          const page = await browser.newPage();
          await page.goto('https://google.com');
          
          const action = process.env.ACTION;
          const x = parseInt(process.env.X);
          const y = parseInt(process.env.Y);
          const text = process.env.TEXT;
          
          console.log(`📱 Action: ${action}, X:${x}, Y:${y}, Text:"${text}"`);
          
          if (action === 'click') {
            await page.mouse.click(x, y);
          } else if (action === 'type') {
            await page.fill('textarea[name="q"]', text);
            await page.press('textarea[name="q"]', 'Enter');
            await page.waitForTimeout(3000);
          }
          
          const ts = Date.now();
          await page.screenshot({path: `screen-${ts}.png`, fullPage: true});
          console.log(`✅ screen-${ts}.png`);
          await browser.close();
        })().catch(console.error);
        EOF
        
        node action.js
        
        # Git commit
        git config user.name "Browser Bot"
        git config user.email "bot@github.com"
        git add *.png
        git commit -m "🎮 Screen: $ACTION $X $Y" || true
        git push
