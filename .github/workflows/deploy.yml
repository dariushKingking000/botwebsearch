name: 🚀 Codespace Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 🔑 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.CODESPACES_SSH_KEY }}" > private_key
        chmod 600 private_key
        ssh-keyscan -H fictional-space-acorn-pj44pjq75j7526jwj-44334.app.github.dev >> ~/.ssh/known_hosts
    
    - name: 🚀 Deploy to Codespace
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: fictional-space-acorn-pj44pjq75j7526jwj-44334.app.github.dev
        username: vscode
        key: ${{ secrets.CODESPACES_SSH_KEY }}
        port: 22
        script: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          cd /workspaces/botwebsearch
          echo "🔥 Deploying from GitHub Actions!"
          
          git pull origin main || true
          
          # دستورات خودت (فعال کن):
          # npm install
          # npm run build
          # npm start
          
          echo "✅ Deploy completed!"
