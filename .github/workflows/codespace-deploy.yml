name: 🚀 Codespace Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 🔑 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.CODESPACES_SSH_KEY }}" > private_key
        chmod 600 private_key
        ssh-keygen -y -f private_key > authorized_keys
        
    - name: 🚀 Deploy to Codespace
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: fictional-space-acorn-pj44pjq75j7526jwj
        username: vscode
        key: ${{ secrets.CODESPACES_SSH_KEY }}
        port: 22
        script: |
          mkdir -p ~/.ssh
          echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKgj81hDQdb17CcsPTYyRKiShTrzYyAXP98MyKt+IM9/ github-actions" >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          
          cd /workspaces/${{ github.event.repository.name }}
          echo "🔥 Deployed from GitHub Actions!"
          git pull origin main || true
          # npm install && npm start  # دستورات خودت
          
          echo "✅ Success!"
